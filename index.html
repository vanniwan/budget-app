  {key:"needs",   label:"Needs",   bg:"#F0DB7D", sub:a=>a.needs+"% of income"},

const INIT_INVESTMENTS=[
  {id:1,name:"TFSA",type:"TFSA",color:"#9CB071",entries:[]},

const MONTH_COLS=["#FFB7D5","#F0DB7D","#9CB071","#B7CEEC","#FFB7D5","#F0DB7D","#9CB071","#AEACEB","#FD9FA2","#F9E4BC","#ACC2D9","#B7CEEC"];
const MONTH_COLS2=["#AEACEB","#FD9FA2","#AEACEB","#FFB7D5","#F0DB7D","#9CB071","#B7CEEC","#FFB7D5","#F9E4BC","#FD9FA2","#AEACEB","#9CB071"];

// ── Helpers ───────────────────────────────────────────────
const n=v=>parseFloat(String(v).replace(/[^0-9.-]/g,""))||0;
const money=v=>"$"+n(v).toLocaleString("en-CA",{minimumFractionDigits:2,maximumFractionDigits:2});
const moneyS=v=>{const a=n(v);if(a>=10000)return"$"+Math.round(a/100)/10+"k";return"$"+n(v).toLocaleString("en-CA",{minimumFractionDigits:0,maximumFractionDigits:0});};
const load=(k,def)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):def;}catch{return def;}};
const save=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}};

const INIT_CATS=[
  {id:1,name:"Groceries",type:"Need"},{id:2,name:"Transit",type:"Need"},
  {id:3,name:"Utilities",type:"Need"},{id:4,name:"Dining Out",type:"Want"},
  {id:5,name:"Shopping",type:"Want"},{id:6,name:"Health",type:"Need"},
  {id:7,name:"Subscriptions",type:"Want"},{id:8,name:"Coffee",type:"Want"},
];
const INIT_ALLOC={needs:50,wants:20,savings:10,joint:500,mom:300};
const INIT_RECUR=[];
const INIT_GOALS=[];

function makeSeedTxns(yr){
  const y=yr||CURRENT_YEAR;
  return MONTHS.map((_,mi)=>{
    if(y===2026&&mi>2)return[];
    if(y!==2026)return[];
    const mm=String(mi+1).padStart(2,"0");
    return [
      {id:mi*100+1,desc:"Loblaws",amount:String(180+mi*10),catId:1,txnType:"Need",date:`${y}-${mm}-05`,recurring:false,kind:"expense"},
      {id:mi*100+2,desc:"TTC Pass",amount:"156",catId:2,txnType:"Need",date:`${y}-${mm}-01`,recurring:true,kind:"expense"},
      {id:mi*100+3,desc:"Hydro",amount:String(95+mi*5),catId:3,txnType:"Need",date:`${y}-${mm}-10`,recurring:true,kind:"expense"},
      {id:mi*100+4,desc:"Dinner out",amount:String(60+mi*15),catId:4,txnType:"Want",date:`${y}-${mm}-14`,recurring:false,kind:"expense"},
      {id:mi*100+5,desc:"Coffee shop",amount:String(55+mi*5),catId:8,txnType:"Want",date:`${y}-${mm}-20`,recurring:false,kind:"expense"},
    ];
  });
}

const S={
  card:{background:"white",borderRadius:18,padding:"18px 20px",boxShadow:"0 2px 12px rgba(0,0,0,0.05)",border:"1px solid #F0F0F8"},
  inp:{border:"1.5px solid #E8E8F0",borderRadius:10,padding:"9px 11px",fontSize:16,fontFamily:"inherit",outline:"none",background:"white",color:"#1a1a1a",width:"100%",boxSizing:"border-box"},
  lbl:{fontSize:10,color:"#bbb",textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:4,display:"block",fontWeight:700},
};

// ── Sub-components ────────────────────────────────────────
function DonutChart({segments,size=110,thickness=20}){
  const r=(size-thickness)/2,cx=size/2,cy=size/2,circ=2*Math.PI*r;
  const total=segments.reduce((s,g)=>s+g.value,0);
  if(!total)return <svg width={size} height={size}><circle cx={cx} cy={cy} r={r} fill="none" stroke="#F0F0F8" strokeWidth={thickness}/></svg>;
  let off=0;
  return <svg width={size} height={size}>{segments.map((seg,i)=>{const dash=(seg.value/total)*circ;const el=<circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color} strokeWidth={thickness} strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off} transform={`rotate(-90 ${cx} ${cy})`}/>;off+=dash;return el;})}</svg>;
}
function Bar({value,max,color,h=6}){
  const pct=max>0?Math.min(value/max*100,100):0;
  return <div style={{background:"#F0F0F8",borderRadius:99,height:h,overflow:"hidden"}}><div style={{width:pct+"%",height:"100%",borderRadius:99,background:color,transition:"width 0.4s"}}/></div>;
}
function FL({children}){return <label style={S.lbl}>{children}</label>;}
function DS(){return <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:13,color:"#aaa",fontWeight:700}}>$</span>;}
function dInp(extra){return{...S.inp,paddingLeft:28,...extra};}

// ── LINE CHART for investments ─────────────────────────────
function LineChart({entries,color,width=300,height=70}){
  if(!entries||entries.length<2)return null;
  const vals=entries.map(e=>e.value);
  const mn=Math.min(...vals),mx=Math.max(...vals);
  const range=mx-mn||1;
  const pts=entries.map((e,i)=>{
    const x=8+(i/(entries.length-1))*(width-16);
    const y=height-8-((e.value-mn)/range)*(height-16);
    return[x,y];
  });
  const d="M"+pts.map(p=>p.join(",")).join(" L");
  const up=vals[vals.length-1]>=vals[0];
  const lineColor=up?"#9CB071":"#FD9FA2";
  return(
    <svg width={width} height={height} style={{overflow:"visible"}}>
      <polyline points={pts.map(p=>p.join(",")).join(" ")} fill="none" stroke={lineColor} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i)=><circle key={i} cx={p[0]} cy={p[1]} r={3} fill={lineColor}/>)}
      <text x={8} y={height-1} fontSize="8" fill="#B0B8C0" fontFamily="Nunito,sans-serif">{entries[0].date.slice(5)}</text>
      <text x={width-8} y={height-1} fontSize="8" fill="#B0B8C0" fontFamily="Nunito,sans-serif" textAnchor="end">{entries[entries.length-1].date.slice(5)}</text>
    </svg>
  );
}

// ── Main App ──────────────────────────────────────────────
function App(){
  const mob=window.innerWidth<600;
  const [,forceUpdate]=useState(0);
  useEffect(()=>{const h=()=>forceUpdate(x=>x+1);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);

  const [year,setYear_]=useState(()=>load("bud_year",CURRENT_YEAR));
  const [view,setView_]=useState(()=>load("bud_view","home"));
  const [mi,setMi_]=useState(()=>load("bud_mi",new Date().getMonth()));
  const [syncStatus,setSyncStatus]=useState("synced");
  const [txX,setTxX]=useState(null);
  const [txY,setTxY]=useState(null);
  const [swipeLocked,setSwipeLocked]=useState(false);

  // Per-year state
  const [incomes,setIncomes_]=useState(()=>load(`bud_incomes_${year}`,Array(12).fill("")));
  const [allTxns,setAllTxns_]=useState(()=>load(`bud_txns_${year}`,makeSeedTxns(year)));
  const [paychecks,setPaychecks_]=useState(()=>load(`bud_paychecks_${year}`,Array(12).fill(2)));
  const [recurOverrides,setRecurOverrides_]=useState(()=>load(`bud_recurApplied_${year}`,Array(12).fill(false)));

  // Shared state
  const [cats,setCats_]=useState(()=>load("bud_cats",INIT_CATS));
  const [recur,setRecur_]=useState(()=>load("bud_recur",INIT_RECUR));
  const [goals,setGoals_]=useState(()=>load("bud_goals",INIT_GOALS));
  const [alloc,setAlloc_]=useState(()=>load("bud_alloc",INIT_ALLOC));
  const [investments,setInvestments_]=useState(()=>load("bud_investments",INIT_INVESTMENTS));

  // Synced setters
  function setView(v){save("bud_view",v);setView_(v);}
  function setMi(v){save("bud_mi",v);setMi_(v);}
  function setYear(v){save("bud_year",v);setYear_(v);}
  function setIncomes(fn){setIncomes_(p=>{const n=typeof fn==="function"?fn(p):fn;save(`bud_incomes_${year}`,n);return n;});}
  function setAllTxns(fn){setAllTxns_(p=>{const n=typeof fn==="function"?fn(p):fn;save(`bud_txns_${year}`,n);return n;});}
  function setPaychecks(fn){setPaychecks_(p=>{const n=typeof fn==="function"?fn(p):fn;save(`bud_paychecks_${year}`,n);return n;});}
  function setRecurOverrides(fn){setRecurOverrides_(p=>{const n=typeof fn==="function"?fn(p):fn;save(`bud_recurApplied_${year}`,n);return n;});}
  function setCats(fn){setCats_(p=>{const n=typeof fn==="function"?fn(p):fn;save("bud_cats",n);return n;});}
  function setRecur(fn){setRecur_(p=>{const n=typeof fn==="function"?fn(p):fn;save("bud_recur",n);return n;});}
  function setGoals(fn){setGoals_(p=>{const n=typeof fn==="function"?fn(p):fn;save("bud_goals",n);return n;});}
  function setAlloc(fn){setAlloc_(p=>{const n=typeof fn==="function"?fn(p):fn;save("bud_alloc",n);return n;});}
  function setInvestments(fn){setInvestments_(p=>{const n=typeof fn==="function"?fn(p):fn;save("bud_investments",n);return n;});}

  // Swipe navigation
  const VIEW_KEYS=["home","month","investments","yearly","recur","goals","cats"];
  function onTS(e){if(e.touches.length!==1){setSwipeLocked(true);return;}setTxX(e.touches[0].clientX);setTxY(e.touches[0].clientY);setSwipeLocked(false);}
  function onTM(e){if(e.touches.length>1)setSwipeLocked(true);}
  function onTE(e){
    if(txX===null||swipeLocked){setTxX(null);return;}
    const dx=e.changedTouches[0].clientX-txX;
    const dy=e.changedTouches[0].clientY-(txY||0);
    if(Math.abs(dx)>80&&Math.abs(dx)>Math.abs(dy)*1.8){
      const idx=VIEW_KEYS.indexOf(view);
      if(dx<0&&idx<VIEW_KEYS.length-1)setView(VIEW_KEYS[idx+1]);
      if(dx>0&&idx>0)setView(VIEW_KEYS[idx-1]);
    }
    setTxX(null);setTxY(null);
  }

  // Firebase sync
  const debRef=useRef(null);
  const isLoadingRef=useRef(false);
  const yearlyData={incomes,allTxns,paychecks,recurOverrides};

  useEffect(()=>{
    if(!db)return;
    isLoadingRef.current=true;
    const ref=db.ref(FB_PATH(year));
    ref.once("value",snap=>{
      const d=snap.val();
      if(d){
        if(d.incomes)setIncomes_(d.incomes);
        if(d.allTxns)setAllTxns_(d.allTxns);
        if(d.paychecks)setPaychecks_(d.paychecks);
        if(d.recurOverrides)setRecurOverrides_(d.recurOverrides);
        if(d.cats)setCats_(d.cats);
        if(d.recur)setRecur_(d.recur);
        if(d.goals)setGoals_(d.goals);
        if(d.alloc)setAlloc_(d.alloc);
      }
      isLoadingRef.current=false;
      setSyncStatus("synced");
    }).catch(()=>{isLoadingRef.current=false;setSyncStatus("offline");});
    return()=>ref.off();
  },[year]);

  useEffect(()=>{
    if(!db||isLoadingRef.current)return;
    setSyncStatus("syncing");
    clearTimeout(debRef.current);
    debRef.current=setTimeout(()=>{
      db.ref(FB_PATH(year)).set({incomes,allTxns,paychecks,recurOverrides,cats,recur,goals,alloc})
        .then(()=>setSyncStatus("synced")).catch(()=>setSyncStatus("offline"));
    },800);
  },[incomes,allTxns,paychecks,recurOverrides,cats,recur,goals,alloc,year]);

  // Firebase investments sync
  const invDebRef=useRef(null);
  const invLoadingRef=useRef(false);
  useEffect(()=>{
    if(!db)return;
    invLoadingRef.current=true;
    const ref=db.ref(FB_INV_PATH);
    ref.once("value",snap=>{
      const d=snap.val();
      if(d)setInvestments_(d);
      invLoadingRef.current=false;
    }).catch(()=>{invLoadingRef.current=false;});
    return()=>ref.off();
  },[]);
  useEffect(()=>{
    if(!db||invLoadingRef.current)return;
    clearTimeout(invDebRef.current);
    invDebRef.current=setTimeout(()=>{
      db.ref(FB_INV_PATH).set(investments).catch(()=>{});
    },800);
  },[investments]);

  function switchYear(y){
    setYear(y);
    setIncomes_(load(`bud_incomes_${y}`,Array(12).fill("")));
    setAllTxns_(load(`bud_txns_${y}`,makeSeedTxns(y)));
    setPaychecks_(load(`bud_paychecks_${y}`,Array(12).fill(2)));
    setRecurOverrides_(load(`bud_recurApplied_${y}`,Array(12).fill(false)));
    setMi(0);
  }

  // UI state
  const [showAdd,setShowAdd]=useState(false);
  const [showAlloc,setShowAlloc]=useState(false);
  const [editAlloc,setEditAlloc]=useState({...alloc});
  const [filter,setFilter]=useState("all");
  const [newTxn,setNewTxn]=useState({desc:"",amount:"",txnType:"Need",catId:"",date:new Date().toISOString().slice(0,10),recurring:false,kind:"expense"});
  const [addSav,setAddSav]=useState({});
  const [newGoal,setNewGoal]=useState({name:"",target:"",saved:""});
  const [showArchived,setShowArchived]=useState(false);
  const [newCat,setNewCat]=useState({name:"",type:"Need"});
  const [newRecur,setNewRecur]=useState({desc:"",amount:"",txnType:"Need",catId:""});
  const [newInv,setNewInv]=useState({name:"",type:"TFSA",color:INV_COLORS[0],startVal:""});
  const [showAddInv,setShowAddInv]=useState(false);
  const [updateVals,setUpdateVals]=useState({});

  // Computed
  const inc=n(incomes[mi]);
  const pc=paychecks[mi]||2;
  const B={
    inc,pc,
    needs:Math.round(inc*n(alloc.needs)/100),
    wants:Math.round(inc*n(alloc.wants)/100),
    savings:Math.round(inc*n(alloc.savings)/100),
    joint:Math.round(n(alloc.joint)*pc),
    mom:Math.round(n(alloc.mom)*pc),
  };
  const mTxns=allTxns[mi]||[];
  const inTxns=mTxns.filter(t=>t.kind==="income");
  const exTxns=mTxns.filter(t=>t.kind==="expense");
  const Sp={
    needs:exTxns.filter(t=>t.txnType==="Need").reduce((s,t)=>s+n(t.amount),0),
    wants:exTxns.filter(t=>t.txnType==="Want").reduce((s,t)=>s+n(t.amount),0),
    savings:exTxns.filter(t=>t.txnType==="Saving").reduce((s,t)=>s+n(t.amount),0),
    total:exTxns.reduce((s,t)=>s+n(t.amount),0),
  };
  const fTxns=filter==="all"?mTxns:filter==="recurring"?mTxns.filter(t=>t.recurring):filter==="income"?mTxns.filter(t=>t.kind==="income"):mTxns.filter(t=>t.txnType===filter);
  const recApplied=recurOverrides[mi];
  const activeGoals=goals.filter(g=>!g.archived);
  const archGoals=goals.filter(g=>g.archived);
  const spendSegs=[{value:Sp.needs,color:"#F0DB7D"},{value:Sp.wants,color:"#FFB7D5"},{value:Sp.savings,color:"#9CB071"}].filter(s=>s.value>0);
  const budgetSegs=B.inc>0?[{value:B.needs,color:"#F0DB7D"},{value:B.wants,color:"#FFB7D5"},{value:B.savings,color:"#9CB071"},{value:B.joint,color:"#B7CEEC"},{value:B.mom,color:"#AEACEB"}]:[];
  const inp=S.inp;

  // Actions
  function addTxn(){
    if(!newTxn.amount||!newTxn.desc)return;
    const t={...newTxn,id:Date.now()};
    if(t.catId)t.catId=Number(t.catId);
    setAllTxns(p=>p.map((arr,i)=>i===mi?[...arr,t]:arr));
    setNewTxn({desc:"",amount:"",txnType:"Need",catId:"",date:new Date().toISOString().slice(0,10),recurring:false,kind:"expense"});
    setShowAdd(false);
  }
  function delTxn(id){setAllTxns(p=>p.map((arr,i)=>i===mi?arr.filter(t=>t.id!==id):arr));}
  function applyRecur(){
    const today=new Date();
    const mm=String(mi+1).padStart(2,"0");
    const toAdd=recur.map(r=>({...r,id:Date.now()+Math.random(),date:`${year}-${mm}-01`}));
    setAllTxns(p=>p.map((arr,i)=>i===mi?[...arr,...toAdd]:arr));
    setRecurOverrides(p=>p.map((v,i)=>i===mi?true:v));
  }
  function saveGoal(id){
    const amt=n(addSav[id]);
    if(!amt)return;
    setGoals(p=>p.map(g=>g.id===id?{...g,saved:g.saved+amt}:g));
    setAddSav(p=>({...p,[id]:""}));
  }
  function archGoal(id){setGoals(p=>p.map(g=>g.id===id?{...g,archived:true}:g));}
  function restoreGoal(id){setGoals(p=>p.map(g=>g.id===id?{...g,archived:false}:g));}
  function delGoal(id){setGoals(p=>p.filter(g=>g.id!==id));}
  function saveAlloc(){setAlloc({...editAlloc});setShowAlloc(false);}

  // All years data for home
  const allYearsData=useMemo(()=>{
    const yrs=[];
    for(let y=2024;y<=CURRENT_YEAR+2;y++){
      const inc_=load(`bud_incomes_${y}`,null);
      const txns=load(`bud_txns_${y}`,null);
      if(!inc_&&!txns)continue;
      const totalInc=(inc_||[]).reduce((s,v)=>s+n(v),0);
      const allT=(txns||[]).flat();
      const totalSpent=allT.filter(t=>t.kind==="expense").reduce((s,t)=>s+n(t.amount),0);
      const fixed=allT.filter(t=>t.recurring).reduce((s,t)=>s+n(t.amount),0);
      if(totalInc>0||totalSpent>0)yrs.push({year:y,totalInc,totalSpent,fixed,net:totalInc-totalSpent,hasData:true});
    }
    return yrs;
  },[year]);

  const totalInvested=investments.reduce((s,inv)=>s+(inv.entries&&inv.entries.length>0?inv.entries[inv.entries.length-1].value:0),0);
  const totalSaved=goals.filter(g=>!g.archived).reduce((s,g)=>s+g.saved,0);
  const netWorth=totalInvested+totalSaved;

  // ── GoalMini ─────────────────────────────────────────────
  function GoalMini({goal}){
    const rem=Math.max(n(goal.target)-goal.saved,0);
    const pct=n(goal.target)>0?Math.min(goal.saved/n(goal.target)*100,100):0;
    const done=rem===0;
    return(
      <div style={{borderBottom:"1px solid #F5F5FA",paddingBottom:12,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div><div style={{fontSize:13,fontWeight:700}}>{goal.name}</div><div style={{fontSize:10,color:"#bbb",marginTop:1}}>{done?"🎉 Complete!":money(rem)+" to go"}</div></div>

        </div>
        <Bar value={goal.saved} max={n(goal.target)} color="#9CB071" h={5}/>
      </div>
    );
  }

                          {cat&&<span style={{fontSize:10,color:"#C0C8D0",fontWeight:600}}>{cat.name}</span>}
                          <span style={{fontSize:10,color:"#D0C8C0"}}>{t.date.slice(5)}</span>
                        </div>
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:8,marginLeft:10,flexShrink:0}}>
                        <span style={{fontSize:15,fontWeight:900,color:t.kind==="income"?"#3A5080":"#2a2a2a",fontVariantNumeric:"tabular-nums"}}>{t.kind==="income"?"+":""}{money(t.amount)}</span>
                        <button className="xbtn" onPointerDown={e=>{e.preventDefault();delTxn(t.id)}}>×</button>
                      </div>
                    </div>
                  );
                })
              )}
            </div>

            {/* Receipt footer */}
            {fTxns.length>0&&(
              <>
                <div style={{margin:"0 18px",borderTop:"2px dashed #EDE8E0",paddingTop:12,paddingBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:12,color:"#B0A898",fontWeight:700,textTransform:"uppercase",letterSpacing:"0.06em"}}>Total spent</span>
                  <span style={{fontSize:18,fontWeight:900,color:"#1a1a1a",fontVariantNumeric:"tabular-nums"}}>{money(fTxns.filter(t=>t.kind==="expense").reduce((s,t)=>s+n(t.amount),0))}</span>
                </div>
                {/* Barcode decoration */}
                <div style={{display:"flex",justifyContent:"center",paddingBottom:16,gap:1}}>
                  {Array.from({length:40},(_,i)=>(
                    <div key={i} style={{width:i%3===0?2:1,height:i%5===0?22:14,background:"#D8D0C8",borderRadius:1}}/>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ── YearlyView ────────────────────────────────────────────
  function YearlyView(){
    const txns=(allTxns||[]).flat();
    const totals={
      inc:(incomes||[]).reduce((s,v)=>s+n(v),0),
      out:txns.filter(t=>t.kind==="expense").reduce((s,t)=>s+n(t.amount),0),
      fixed:txns.filter(t=>t.recurring&&t.kind==="expense").reduce((s,t)=>s+n(t.amount),0),
    };
    const monthlyData=MONTHS.map((m,i)=>{
      const mt=allTxns[i]||[];
      return{m,inc:n(incomes[i]),out:mt.filter(t=>t.kind==="expense").reduce((s,t)=>s+n(t.amount),0)};
    });
    return(
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div style={{...S.card,background:"linear-gradient(135deg,#9D5783,#AEACEB)",border:"none"}}>
          <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>{year} Summary</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12}}>
            {[{l:"Income",v:totals.inc,c:"#F0DB7D"},{l:"Spent",v:totals.out,c:"#FFB7D5"},{l:"Net",v:totals.inc-totals.out,c:(totals.inc-totals.out)>=0?"#9CB071":"#FD9FA2"}].map(s=>(
              <div key={s.l}>
                <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.6)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{s.l}</div>
                <div style={{fontSize:mob?18:24,fontWeight:900,color:s.c}}>{moneyS(Math.abs(s.v))}</div>
              </div>
            ))}
          </div>
        </div>
        <div style={S.card}>
          <div style={{fontSize:12,fontWeight:800,color:"#1a1a1a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>Monthly</div>
          {monthlyData.filter(d=>d.inc>0||d.out>0).map(d=>(
            <div key={d.m} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                <span style={{fontSize:12,fontWeight:700,color:"#555"}}>{d.m}</span>
                <div style={{display:"flex",gap:12}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#3A5010"}}>{moneyS(d.inc)}</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#8A1060"}}>{moneyS(d.out)}</span>
                  <span style={{fontSize:12,fontWeight:800,color:d.inc>=d.out?"#3A5010":"#c04040"}}>{moneyS(d.inc-d.out)}</span>
                </div>
              </div>
              <Bar value={d.out} max={d.inc||1} color={d.out>d.inc?"#FD9FA2":"#9CB071"} h={4}/>
            </div>
          ))}
        </div>
        {allYearsData.length>1&&(
          <div style={S.card}>
            <div style={{fontSize:12,fontWeight:800,color:"#1a1a1a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>All Years</div>
            {allYearsData.map(d=>(
              <div key={d.year} onClick={()=>switchYear(d.year)} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F5F5FA",cursor:"pointer"}}>
                <span style={{fontSize:13,fontWeight:700,color:d.year===year?"#9D5783":"#555"}}>{d.year}</span>
                <div style={{display:"flex",gap:10}}>
                  <span style={{fontSize:12,fontWeight:700,color:"#3A5010"}}>{moneyS(d.totalInc)}</span>
                  <span style={{fontSize:12,fontWeight:700,color:"#8A1060"}}>{moneyS(d.totalSpent)}</span>
                  <span style={{fontSize:12,fontWeight:800,color:d.net>=0?"#3A5010":"#c04040"}}>{moneyS(Math.abs(d.net))}</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ── Main render ───────────────────────────────────────────
  // Compute current year live from state (not stale localStorage)
  const thisYear=useMemo(()=>{
    const totalInc=incomes.reduce((s,v)=>s+n(v),0);
    const allT=(allTxns||[]).flat();
    const totalSpent=allT.filter(t=>t.kind==="expense").reduce((s,t)=>s+n(t.amount),0);
    const net=totalInc-totalSpent;
    return {year,totalInc,totalSpent,net,hasData:totalInc>0||totalSpent>0};
  },[incomes,allTxns,year]);

  return(
    <div style={{fontFamily:"'Nunito',sans-serif",fontWeight:500,background:"#FAF7F2",minHeight:"100vh",padding:mob?"14px 12px":"24px 18px",color:"#1a1a1a"}}>

      {/* Edit Alloc Modal */}
      {showAlloc&&(
        <div className="overlay" onClick={()=>setShowAlloc(false)} style={{position:"fixed",inset:0,background:"rgba(30,40,50,0.4)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"white",borderRadius:"20px 20px 0 0",padding:24,width:"100%",maxWidth:500,paddingBottom:"max(24px,env(safe-area-inset-bottom))"}}>
            <div style={{fontSize:18,fontWeight:900,marginBottom:20}}>Edit Allocation</div>
            {[{k:"needs",l:"Needs %"},{k:"wants",l:"Wants %"},{k:"savings",l:"Savings %"}].map(f=>(
              <div key={f.k} style={{marginBottom:14}}>
                <FL>{f.l}</FL>
                <input style={inp} type="number" value={editAlloc[f.k]} onChange={e=>setEditAlloc(p=>({...p,[f.k]:e.target.value}))}/>
              </div>
            ))}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              {[{k:"joint",l:"Joint per paycheque"},{k:"mom",l:"Mom per paycheque"}].map(f=>(
                <div key={f.k}>
                  <FL>{f.l}</FL>
                  <div style={{position:"relative"}}><DS/><input style={dInp({fontSize:16})} type="number" value={editAlloc[f.k]} onChange={e=>setEditAlloc(p=>({...p,[f.k]:e.target.value}))}/></div>
                </div>
              ))}
            </div>
            <button className="tbtn" onClick={saveAlloc} style={{width:"100%",padding:"14px",background:"#9D5783",color:"white",borderRadius:12,fontSize:15,fontWeight:800}}>Save</button>
          </div>
        </div>
      )}

      {/* Header */}
      <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{display:"flex",alignItems:"baseline",gap:8}}>
            <h1 style={{fontFamily:"'Nunito',sans-serif",fontSize:mob?26:32,fontWeight:900,letterSpacing:"-0.02em",color:"#1a1a1a"}}>budget.</h1>
            <select value={year} onChange={e=>switchYear(Number(e.target.value))} style={{fontFamily:"'Nunito',sans-serif",fontSize:mob?14:16,fontWeight:700,border:"none",background:"transparent",color:"#B0B8C0",cursor:"pointer",outline:"none",appearance:"none"}}>
              {Array.from({length:Math.max(year,CURRENT_YEAR)-2024+3},(_,i)=>2024+i).map(y=><option key={y} value={y}>{y}</option>)}
            </select>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:1}}>
            <p style={{fontSize:11,color:"#C0B8C8",fontWeight:700,letterSpacing:"0.05em",textTransform:"uppercase"}}>Vanni</p>
            <div title={syncStatus} style={{width:6,height:6,borderRadius:"50%",background:syncStatus==="synced"?"#9CB071":syncStatus==="syncing"?"#F0DB7D":"#FD9FA2",transition:"background 0.3s"}}/>
          </div>
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <div style={{width:24,height:24,borderRadius:"50%",background:"#FFB7D5",opacity:0.7}}/>
          <div style={{width:16,height:16,borderRadius:"50%",background:"#F0DB7D",opacity:0.8}}/>
          <div style={{width:20,height:20,borderRadius:"50%",background:"#9CB071",opacity:0.6}}/>
        </div>
      </div>

      {/* Nav */}
      <div className="hscroll" style={{marginBottom:16}}>
        <div style={{display:"flex",gap:3,background:"#F0F0F8",borderRadius:14,padding:4,width:"fit-content"}}>
          {VIEWS.map(([k,icon])=>(
            <button key={k} className="tbtn" onClick={()=>setView(k)} style={{padding:"7px 13px",borderRadius:10,fontSize:12,fontWeight:view===k?800:600,background:view===k?"white":"transparent",color:view===k?"#1a1a1a":"#A0A8B8",boxShadow:view===k?"0 2px 6px rgba(0,0,0,0.08)":"none",whiteSpace:"nowrap"}}>
              {k==="home"?"Home":k==="month"?"Month":k==="investments"?"Invest":k==="yearly"?"Yearly":k==="recur"?"Recurring":k==="goals"?"Goals":"Categories"}
            </button>
          ))}
        </div>
      </div>

      {/* Month tabs — only on month view */}
      {view==="month"&&(
        <div style={{marginBottom:0,overflowX:"auto",display:"flex",WebkitOverflowScrolling:"touch"}}>
          <div style={{display:"flex",gap:0,minWidth:"max-content"}}>
            {MONTHS.map((m,i)=>{
              const active=i===mi;
              const hasTxns=allTxns[i]&&allTxns[i].length>0;
              const col=MONTH_COLS[i];
              return(
                <button key={m} onClick={()=>setMi(i)} style={{border:"none",borderBottom:active?"3px solid "+col:"3px solid transparent",cursor:"pointer",borderRadius:"10px 10px 0 0",padding:"8px 13px",fontSize:12,fontFamily:"inherit",background:active?col:"rgba(255,255,255,0.5)",color:active?"#1a1a1a":hasTxns?"#888":"#ccc",fontWeight:active?800:hasTxns?600:400,flexShrink:0,transition:"background 0.15s, color 0.15s",position:"relative",zIndex:active?2:1}}>
                  {m}{hasTxns&&!active?" ·":""}
                </button>
              );
            })}
          </div>
        </div>
      )}
      {view==="month"&&<div style={{height:3,background:"#F0F0F8",marginBottom:16,borderRadius:"0 0 4px 4px"}}/>}

      {/* View content */}
      <div onTouchStart={onTS} onTouchMove={onTM} onTouchEnd={onTE} style={{userSelect:"none"}}>
        {/* HOME */}
        {view==="home"&&(()=>{
          return(
            <div style={{display:"flex",flexDirection:"column",gap:16}}>
              {/* Net worth circle + glance */}
              <div style={{display:"flex",gap:12,alignItems:"stretch"}}>
                <div style={{background:"linear-gradient(145deg,#9CB071,#AEACEB)",borderRadius:24,padding:"20px 16px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minWidth:mob?130:150,flexShrink:0,position:"relative",overflow:"hidden",boxShadow:"0 6px 20px rgba(156,176,113,0.3)"}}>
                  <div style={{fontSize:9,fontWeight:700,color:"rgba(255,255,255,0.75)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:8}}>Net Worth</div>
                  <div style={{position:"relative",width:mob?84:96,height:mob?84:96,marginBottom:10}}>
                    <svg viewBox="0 0 100 100" style={{width:"100%",height:"100%",transform:"rotate(-90deg)"}}>
                      <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="9"/>
                      <circle cx="50" cy="50" r="42" fill="none" stroke="white" strokeWidth="9" strokeDasharray={`${Math.min((netWorth/500000)*264,264)} 264`} strokeLinecap="round"/>
                    </svg>
                    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <div style={{fontSize:mob?12:14,fontWeight:900,color:"white",textAlign:"center",lineHeight:1.1}}>{moneyS(netWorth)}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4,width:"100%"}}>
                    {[{l:"Invest",v:totalInvested,dot:"#F0DB7D"},{l:"Goals",v:totalSaved,dot:"#FFB7D5"}].map(s=>(
                      <div key={s.l} style={{display:"flex",alignItems:"center",gap:5}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:s.dot,flexShrink:0}}/>
                        <div style={{fontSize:9,fontWeight:600,color:"rgba(255,255,255,0.7)",flex:1}}>{s.l}</div>
                        <div style={{fontSize:10,fontWeight:800,color:"white"}}>{moneyS(s.v)}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{flex:1,display:"flex",flexDirection:"column",gap:8}}>
                  <div style={{fontSize:11,fontWeight:800,color:"#9D5783",textTransform:"uppercase",letterSpacing:"0.08em"}}>{year} at a glance</div>
                  {thisYear.hasData?(
                    <>
                      {[
                        {l:"Income",v:thisYear.totalInc,bg:"#B7CEEC",c:"#1A3D60"},
                        {l:"Spent",v:thisYear.totalSpent,bg:"#FFB7D5",c:"#701040"},
                        {l:"Net",v:thisYear.net,bg:thisYear.net>=0?"#9CB071":"#FD9FA2",c:thisYear.net>=0?"#2A4A10":"#801010"},
                      ].map(s=>(
                        <div key={s.l} style={{background:s.bg,borderRadius:12,padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <span style={{fontSize:11,fontWeight:800,color:s.c,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.l}</span>
                          <span style={{fontSize:mob?13:15,fontWeight:900,color:s.c}}>{s.v<0?"-":""}{moneyS(Math.abs(s.v))}</span>
                        </div>
                      ))}
                    </>
                  ):(
                    <div style={{fontSize:12,color:"#C0C8D0",padding:"10px 0",fontWeight:600}}>No data for {year}</div>
                  )}
                </div>
              </div>

              {/* Investment accounts */}
              {investments.length>0&&(
                <div style={S.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <div style={{fontSize:12,fontWeight:800,color:"#1a1a1a",textTransform:"uppercase",letterSpacing:"0.06em"}}>Investments</div>
                    <button className="tbtn" onClick={()=>setView("investments")} style={{fontSize:11,fontWeight:700,color:"#9D5783",background:"none",padding:0}}>Manage →</button>
                  </div>
                  {investments.map(inv=>{
                    const latest=inv.entries&&inv.entries.length>0?inv.entries[inv.entries.length-1].value:0;
                    const first=inv.entries&&inv.entries.length>0?inv.entries[0].value:0;
                    const gain=latest-first;
                    return(
                      <div key={inv.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F5F5FA"}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <div style={{width:10,height:10,borderRadius:"50%",background:inv.color,flexShrink:0}}/>
                          <div>
                            <div style={{fontSize:13,fontWeight:700}}>{inv.name}</div>
                            <div style={{fontSize:10,color:"#bbb",fontWeight:600}}>{inv.type}</div>
                          </div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:14,fontWeight:900}}>{moneyS(latest)}</div>
                          {gain!==0&&<div style={{fontSize:10,fontWeight:700,color:gain>0?"#3A5010":"#c04040"}}>{gain>0?"+":""}{moneyS(gain)}</div>}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* Goals */}
              {activeGoals.length>0&&(
                <div style={S.card}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                    <div style={{fontSize:12,fontWeight:800,color:"#1a1a1a",textTransform:"uppercase",letterSpacing:"0.06em"}}>Goals</div>
                    <button className="tbtn" onClick={()=>setView("goals")} style={{fontSize:11,fontWeight:700,color:"#9D5783",background:"none",padding:0}}>All →</button>
                  </div>
                  {activeGoals.slice(0,3).map(g=><GoalMini key={g.id} goal={g}/>)}
                </div>
              )}

              {/* Monthly savings strip */}
              <div style={S.card}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:800,color:"#1a1a1a",textTransform:"uppercase",letterSpacing:"0.06em"}}>{year} Monthly</div>
                  <button className="tbtn" onClick={()=>setView("yearly")} style={{fontSize:11,fontWeight:700,color:"#9D5783",background:"none",padding:0}}>Details →</button>
                </div>
                <div style={{display:"flex",gap:4,alignItems:"flex-end",height:56}}>
                  {MONTHS.map((_,i)=>{
                    const mInc=n(incomes[i]);
                    const mSp=(allTxns[i]||[]).filter(t=>t.kind==="expense").reduce((s,t)=>s+n(t.amount),0);
                    const net=mInc-mSp;
                    const hasData=mInc>0||mSp>0;
                    const maxVal=Math.max(...MONTHS.map((_,j)=>{const a=n(incomes[j]);const b=(allTxns[j]||[]).filter(t=>t.kind==="expense").reduce((s,t)=>s+n(t.amount),0);return Math.abs(a-b);}),1);
                    const h=hasData?Math.max(Math.abs(net)/maxVal*44,3):3;
                    const col=!hasData?"#F0F0F8":net>=0?"#9CB071":"#FD9FA2";
                    return(
                      <div key={i} onClick={()=>{setMi(i);setView("month");}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:"pointer"}}>
                        <div style={{width:"100%",height:h,borderRadius:"3px 3px 0 0",background:col,transition:"height 0.3s"}}/>
                        <span style={{fontSize:8,fontWeight:i===mi?800:600,color:i===mi?"#9D5783":"#C0C8D0"}}>{MONTHS[i].slice(0,1)}</span>
                      </div>
                    );
                  })}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
                  <span style={{fontSize:11,fontWeight:700,color:"#B0B8C0"}}>
                    {MONTHS.filter((_,i)=>n(incomes[i])>0).length} months tracked
                  </span>
                  <span style={{fontSize:11,fontWeight:800,color:thisYear.net>=0?"#3A5010":"#c04040"}}>
                    {thisYear.net>=0?"Saved ":"Over "}{moneyS(Math.abs(thisYear.net||0))} YTD
                  </span>
                </div>
              </div>

              {/* All years */}
              {allYearsData.length>0&&(
                <div style={S.card}>
                  <div style={{fontSize:12,fontWeight:800,color:"#1a1a1a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:12}}>Year History</div>
                  {allYearsData.map(d=>(
                    <div key={d.year} onClick={()=>{switchYear(d.year);setView("yearly");}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid #F5F5FA",cursor:"pointer"}}>
                      <span style={{fontSize:13,fontWeight:700,color:d.year===year?"#9D5783":"#555"}}>{d.year}</span>
                      <div style={{display:"flex",gap:10}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#3A5010"}}>{moneyS(d.totalInc)}</span>
                        <span style={{fontSize:12,fontWeight:700,color:"#8A1060"}}>{moneyS(d.totalSpent)}</span>
                        <span style={{fontSize:12,fontWeight:800,color:d.net>=0?"#3A5010":"#c04040"}}>{moneyS(Math.abs(d.net))}</span>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        })()}

        {view==="month"&&MonthView()}
        {view==="yearly"&&YearlyView()}

        {/* INVESTMENTS */}
        {view==="investments"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            {/* Big gradient total box */}
            {investments.length>0&&(()=>{
              const firstVal=investments.reduce((s,inv)=>s+(inv.entries&&inv.entries.length>0?inv.entries[0].value:0),0);
              const totalGain=totalInvested-firstVal;
              const totalGainPct=firstVal>0?(totalGain/firstVal*100):0;
              return(
                <div style={{background:"linear-gradient(135deg,#9D5783,#AEACEB)",borderRadius:24,padding:mob?"22px 20px":"28px 28px 24px",boxShadow:"0 8px 28px rgba(157,87,131,0.28)"}}>
                  <div style={{fontSize:11,fontWeight:700,color:"rgba(255,255,255,0.7)",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Total Invested</div>
                  <div style={{fontSize:mob?38:52,fontWeight:900,color:"white",lineHeight:1,marginBottom:8,letterSpacing:"-0.02em"}}>{moneyS(totalInvested)}</div>
                  {totalGain!==0&&(
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16}}>
                      <span style={{fontSize:14,fontWeight:800,color:totalGain>0?"#D4F0B0":"#FFD0D0"}}>{totalGain>0?"▲":"▼"} {moneyS(Math.abs(totalGain))}</span>
                      <span style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.55)"}}>all time ({totalGainPct>0?"+":""}{totalGainPct.toFixed(1)}%)</span>
                    </div>
                  )}
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {investments.map(inv=>{
                      const latest=inv.entries&&inv.entries.length>0?inv.entries[inv.entries.length-1].value:0;
                      const pct=totalInvested>0?Math.round(latest/totalInvested*100):0;
                      return(
                        <div key={inv.id} style={{display:"flex",alignItems:"center",gap:5,background:"rgba(255,255,255,0.15)",borderRadius:99,padding:"5px 10px"}}>
                          <div style={{width:7,height:7,borderRadius:"50%",background:inv.color,flexShrink:0}}/>
                          <span style={{fontSize:11,fontWeight:700,color:"white"}}>{inv.name}</span>
                          <span style={{fontSize:11,fontWeight:800,color:"rgba(255,255,255,0.7)"}}>{pct}%</span>
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })()}
            {investments.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:mob?"repeat(2,1fr)":"repeat(4,1fr)",gap:10}}>
                {investments.map(inv=>{
                  const latest=inv.entries&&inv.entries.length>0?inv.entries[inv.entries.length-1].value:0;
                  const prev=inv.entries&&inv.entries.length>1?inv.entries[inv.entries.length-2].value:latest;
                  const change=latest-prev;
                  return(
                    <div key={inv.id} className="bucket-card" style={{background:inv.color,borderRadius:18,padding:mob?"14px 12px":"18px 16px 14px",boxShadow:"0 4px 14px rgba(0,0,0,0.1)"}}>
                      <div style={{fontSize:9,fontWeight:700,color:"rgba(0,0,0,0.45)",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{inv.type}</div>
                      <div style={{fontSize:mob?16:20,fontWeight:900,color:"#1a1a1a",marginBottom:2}}>{moneyS(latest)}</div>
                      <div style={{fontSize:10,fontWeight:600,color:"rgba(0,0,0,0.45)"}}>{inv.name}</div>
                      {change!==0&&<div style={{fontSize:10,fontWeight:700,color:change>0?"#2A4A10":"#c04040",marginTop:4}}>{change>0?"+":""}{moneyS(change)}</div>}
                    </div>
                  );
                })}
              </div>
            )}
            {investments.map(inv=>{
              const latest=inv.entries&&inv.entries.length>0?inv.entries[inv.entries.length-1].value:0;
              const first=inv.entries&&inv.entries.length>0?inv.entries[0].value:0;
              const gain=latest-first;
              const pct=first>0?(gain/first*100):0;
              return(
                <div key={inv.id} style={{...S.card,borderLeft:"4px solid "+inv.color}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:800,marginBottom:2}}>{inv.name}</div>
                      <span style={{fontSize:11,padding:"2px 8px",borderRadius:99,background:inv.color+"33",color:"#1a1a1a",fontWeight:700}}>{inv.type}</span>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:18,fontWeight:900}}>{moneyS(latest)}</div>
                      {gain!==0&&<div style={{fontSize:11,fontWeight:700,color:gain>0?"#3A5010":"#c04040"}}>{gain>0?"+":""}{moneyS(gain)} ({gain>0?"+":""}{pct.toFixed(1)}%)</div>}
                    </div>
                  </div>
                  {inv.entries&&inv.entries.length>=2&&<LineChart entries={inv.entries.slice(-12)} color={inv.color}/>}
                  <div style={{display:"flex",gap:8,marginTop:12,alignItems:"center"}}>
                    <div style={{position:"relative",flex:1}}><DS/><input style={dInp({fontSize:16})} placeholder="Update value" value={updateVals[inv.id]||""} onChange={e=>setUpdateVals(p=>({...p,[inv.id]:e.target.value}))}/></div>
                    <button className="tbtn" onClick={()=>{
                      const v=n(updateVals[inv.id]);
                      if(!v)return;
                      const entry={date:new Date().toISOString().slice(0,10),value:v};
                      setInvestments(p=>p.map(i=>i.id===inv.id?{...i,entries:[...(i.entries||[]),entry]}:i));
                      setUpdateVals(p=>({...p,[inv.id]:""}));
                    }} style={{padding:"8px 16px",background:inv.color,color:"#1a1a1a",borderRadius:10,fontWeight:800,fontSize:12}}>Save</button>
                    <button className="xbtn" style={{fontSize:18}} onPointerDown={e=>{e.preventDefault();setInvestments(p=>p.filter(i=>i.id!==inv.id))}}>×</button>
                  </div>
                </div>
              );
            })}
            <button className="tbtn" onClick={()=>setShowAddInv(p=>!p)} style={{padding:"8px 20px",background:"#9D5783",color:"white",borderRadius:12,fontSize:13,fontWeight:800,alignSelf:"flex-start"}}>
              {showAddInv?"✕ Cancel":"+ Add Account"}
            </button>
            {showAddInv&&(
              <div style={{...S.card,border:"2px solid #AEACEB"}}>
                <div style={{fontSize:12,fontWeight:800,color:"#9D5783",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>New Account</div>
                <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                  <div style={{flex:"2 1 130px"}}><FL>Name</FL><input style={inp} placeholder="e.g. TFSA" value={newInv.name} onChange={e=>setNewInv(p=>({...p,name:e.target.value}))}/></div>
                  <div style={{flex:"1 1 100px"}}><FL>Type</FL><select style={{...inp,cursor:"pointer",fontSize:16}} value={newInv.type} onChange={e=>setNewInv(p=>({...p,type:e.target.value}))}>{INV_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
                  <div style={{flex:"1 1 100px"}}><FL>Starting Value</FL><div style={{position:"relative"}}><DS/><input style={dInp({fontSize:16})} placeholder="0" value={newInv.startVal} onChange={e=>setNewInv(p=>({...p,startVal:e.target.value}))}/></div></div>
                  <div style={{flex:"1 1 160px"}}>
                    <FL>Colour</FL>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {INV_COLORS.map(col=>(
                        <div key={col} onClick={()=>setNewInv(p=>({...p,color:col}))} style={{width:24,height:24,borderRadius:"50%",background:col,cursor:"pointer",border:newInv.color===col?"3px solid #1a1a1a":"3px solid transparent"}}/>
                      ))}
                    </div>
                  </div>
                  <button className="tbtn" onClick={()=>{
                    if(!newInv.name)return;
                    const inv={id:Date.now(),name:newInv.name,type:newInv.type,color:newInv.color,entries:newInv.startVal?[{date:new Date().toISOString().slice(0,10),value:n(newInv.startVal)}]:[]};
                    setInvestments(p=>[...p,inv]);
                    setNewInv({name:"",type:"TFSA",color:INV_COLORS[0],startVal:""});
                    setShowAddInv(false);
                  }} style={{padding:"8px 20px",background:"#9CB071",color:"white",borderRadius:10,fontWeight:800,fontSize:13}}>Add</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* GOALS */}
        {view==="goals"&&(
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            {activeGoals.length>0&&(
              <div style={{display:"grid",gridTemplateColumns:"repeat(2,1fr)",gap:12}}>
                {activeGoals.map((goal,gi)=>{
                  const GCOLS=["#FFB7D5","#F0DB7D","#9CB071","#B7CEEC","#AEACEB","#FD9FA2","#F9E4BC","#ACC2D9"];
                  const col=GCOLS[gi%GCOLS.length];
                  const rem=Math.max(n(goal.target)-goal.saved,0);
                  const pct=n(goal.target)>0?Math.min(goal.saved/n(goal.target)*100,100):0;
                  const done=rem===0;
                  return(
                    <div key={goal.id} style={{background:col,borderRadius:20,padding:"18px 16px 14px",position:"relative",overflow:"hidden",boxShadow:"0 4px 16px rgba(0,0,0,0.08)"}}>
                      <button className="xbtn" onPointerDown={e=>{e.preventDefault();delGoal(goal.id)}} style={{position:"absolute",top:10,right:10,fontSize:16,color:"rgba(0,0,0,0.3)"}}>×</button>
                      <div style={{fontSize:13,fontWeight:800,color:"#1a1a1a",marginBottom:2,paddingRight:20}}>{goal.name}</div>
                      <div style={{fontSize:10,fontWeight:600,color:"rgba(0,0,0,0.45)",marginBottom:12}}>{done?"🎉 Complete!":money(rem)+" to go"}</div>
                      <div style={{fontSize:32,fontWeight:900,color:"#1a1a1a",lineHeight:1,marginBottom:8}}>{Math.round(pct)}<span style={{fontSize:16}}>%</span></div>
                      <div style={{background:"rgba(255,255,255,0.5)",borderRadius:99,height:6,overflow:"hidden",marginBottom:10}}>
                        <div style={{width:pct+"%",height:"100%",borderRadius:99,background:"rgba(0,0,0,0.2)",transition:"width 0.4s"}}/>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,fontWeight:700,color:"rgba(0,0,0,0.5)",marginBottom:done?0:10}}>
                        <span><b style={{color:"#1a1a1a"}}>{moneyS(goal.saved)}</b> saved</span>
                        <span>of <b style={{color:"#1a1a1a"}}>{moneyS(goal.target)}</b></span>
                      </div>
                      {!done&&(
                        <div style={{display:"flex",gap:6,alignItems:"center"}}>
                          <div style={{position:"relative",flex:1}}>
                            <span style={{position:"absolute",left:9,top:"50%",transform:"translateY(-50%)",fontSize:12,color:"rgba(0,0,0,0.4)",fontWeight:700}}>$</span>
                            <input style={{border:"none",background:"rgba(255,255,255,0.6)",borderRadius:8,padding:"7px 8px 7px 20px",fontSize:16,fontFamily:"inherit",outline:"none",width:"100%",boxSizing:"border-box",color:"#1a1a1a",fontWeight:700}} placeholder="0.00" value={addSav[goal.id]||""} onChange={e=>setAddSav(p=>({...p,[goal.id]:e.target.value}))}/>
                          </div>
                          <button className="tbtn" onClick={()=>saveGoal(goal.id)} style={{padding:"7px 12px",background:"rgba(255,255,255,0.7)",color:"#1a1a1a",border:"none",borderRadius:8,fontWeight:800,fontSize:12}}>+ Save</button>
                        </div>
                      )}
                      {done&&<button onClick={()=>archGoal(goal.id)} style={{fontSize:11,padding:"5px 14px",borderRadius:99,background:"rgba(255,255,255,0.6)",color:"#1a1a1a",border:"none",cursor:"pointer",fontFamily:"inherit",fontWeight:700}}>Archive ✓</button>}
                    </div>
                  );
                })}
              </div>
            )}
            <div style={{...S.card,border:"2px dashed #D0D0E8",boxShadow:"none"}}>
              <div style={{fontSize:12,fontWeight:800,color:"#B0B8C0",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>New Goal</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div style={{flex:"2 1 140px"}}><FL>Name</FL><input style={inp} placeholder="e.g. Europe Trip" value={newGoal.name} onChange={e=>setNewGoal(p=>({...p,name:e.target.value}))}/></div>
                <div style={{flex:"1 1 100px"}}><FL>Target</FL><div style={{position:"relative"}}><DS/><input style={dInp({fontSize:16})} placeholder="5000" value={newGoal.target} onChange={e=>setNewGoal(p=>({...p,target:e.target.value}))}/></div></div>
                <div style={{flex:"1 1 100px"}}><FL>Already saved</FL><div style={{position:"relative"}}><DS/><input style={dInp({fontSize:16})} placeholder="0" value={newGoal.saved} onChange={e=>setNewGoal(p=>({...p,saved:e.target.value}))}/></div></div>
                <button className="tbtn" onClick={()=>{if(!newGoal.name.trim()||!newGoal.target)return;setGoals(p=>[...p,{...newGoal,id:Date.now(),saved:n(newGoal.saved),archived:false}]);setNewGoal({name:"",target:"",saved:""});}} style={{padding:"8px 20px",background:"#9CB071",color:"white",borderRadius:10,fontWeight:800}}>+ Add</button>
              </div>
            </div>
            {archGoals.length>0&&(
              <div>
                <button className="tbtn" onClick={()=>setShowArchived(p=>!p)} style={{fontSize:12,color:"#B0B8C0",background:"none",padding:"6px 0",marginBottom:8,fontWeight:700}}>
                  {showArchived?"▾":"▸"} {archGoals.length} archived
                </button>
                {showArchived&&archGoals.map(goal=>(
                  <div key={goal.id} style={{...S.card,opacity:0.6,borderLeft:"4px solid #D0D0E8",marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontSize:14,fontWeight:700,color:"#888"}}>{goal.name}</div><div style={{fontSize:11,color:"#bbb",fontWeight:600}}>🎉 {money(goal.saved)} saved</div></div>
                      <div style={{display:"flex",gap:8}}>
                        <button onPointerDown={e=>{e.preventDefault();restoreGoal(goal.id)}} style={{fontSize:11,padding:"4px 10px",borderRadius:99,background:"#f5f5f5",color:"#888",border:"1px solid #eee",cursor:"pointer",fontFamily:"inherit",fontWeight:600}}>Restore</button>
                        <button className="xbtn" onPointerDown={e=>{e.preventDefault();delGoal(goal.id)}}>×</button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* RECURRING */}
        {view==="recur"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={S.card}>
              <div style={{fontSize:12,fontWeight:800,color:"#1a1a1a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>Recurring Transactions</div>
              {recur.length===0?<p style={{fontSize:13,color:"#ccc",fontWeight:600}}>No recurring transactions yet.</p>:recur.map((r,i)=>(
                <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid #F5F5FA"}}>
                  <div>
                    <div style={{fontSize:13,fontWeight:700}}>{r.desc}</div>
                    <div style={{fontSize:10,fontWeight:600,color:"#bbb"}}>{r.txnType}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:14,fontWeight:800}}>{money(r.amount)}</span>
                    <button className="xbtn" onPointerDown={e=>{e.preventDefault();setRecur(p=>p.filter((_,j)=>j!==i))}}>×</button>
                  </div>
                </div>
              ))}
            </div>
            <div style={{...S.card,border:"2px dashed #D0D0E8",boxShadow:"none"}}>
              <div style={{fontSize:12,fontWeight:800,color:"#B0B8C0",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>Add Recurring</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div style={{flex:"2 1 140px"}}><FL>Description</FL><input style={inp} placeholder="e.g. Netflix" value={newRecur.desc} onChange={e=>setNewRecur(p=>({...p,desc:e.target.value}))}/></div>
                <div style={{flex:"1 1 100px"}}><FL>Amount</FL><div style={{position:"relative"}}><DS/><input style={dInp({fontSize:16})} placeholder="0.00" value={newRecur.amount} onChange={e=>setNewRecur(p=>({...p,amount:e.target.value}))}/></div></div>
                <div style={{flex:"1 1 100px"}}><FL>Type</FL><select style={{...inp,cursor:"pointer",fontSize:16}} value={newRecur.txnType} onChange={e=>setNewRecur(p=>({...p,txnType:e.target.value}))}><option>Need</option><option>Want</option><option>Saving</option></select></div>
                <button className="tbtn" onClick={()=>{if(!newRecur.desc||!newRecur.amount)return;setRecur(p=>[...p,{...newRecur,id:Date.now(),recurring:true,kind:"expense"}]);setNewRecur({desc:"",amount:"",txnType:"Need",catId:""}); }} style={{padding:"8px 20px",background:"#9CB071",color:"white",borderRadius:10,fontWeight:800}}>+ Add</button>
              </div>
            </div>
          </div>
        )}

        {/* CATEGORIES */}
        {view==="cats"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={S.card}>
              <div style={{fontSize:12,fontWeight:800,color:"#1a1a1a",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:14}}>Categories</div>
              {["Need","Want"].map(type=>(
                <div key={type} style={{marginBottom:16}}>
                  <div style={{fontSize:11,fontWeight:800,color:"#9D5783",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:8}}>{type}s</div>
                  {cats.filter(c=>c.type===type).map(c=>(
                    <div key={c.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #F5F5FA"}}>
                      <span style={{fontSize:13,fontWeight:600}}>{c.name}</span>
                      <button className="xbtn" onPointerDown={e=>{e.preventDefault();setCats(p=>p.filter(x=>x.id!==c.id))}}>×</button>
                    </div>
                  ))}
                </div>
              ))}
            </div>
            <div style={{...S.card,border:"2px dashed #D0D0E8",boxShadow:"none"}}>
              <div style={{fontSize:12,fontWeight:800,color:"#B0B8C0",textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:14}}>Add Category</div>
              <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                <div style={{flex:"2 1 140px"}}><FL>Name</FL><input style={inp} placeholder="e.g. Gym" value={newCat.name} onChange={e=>setNewCat(p=>({...p,name:e.target.value}))}/></div>
                <div style={{flex:"1 1 100px"}}><FL>Type</FL><select style={{...inp,cursor:"pointer",fontSize:16}} value={newCat.type} onChange={e=>setNewCat(p=>({...p,type:e.target.value}))}><option>Need</option><option>Want</option></select></div>
                <button className="tbtn" onClick={()=>{if(!newCat.name.trim())return;setCats(p=>[...p,{...newCat,id:Date.now()}]);setNewCat({name:"",type:"Need"});}} style={{padding:"8px 20px",background:"#9CB071",color:"white",borderRadius:10,fontWeight:800}}>+ Add</button>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker" in navigator){navigator.serviceWorker.register("./sw.js");}
</script>
</body>
</html>
