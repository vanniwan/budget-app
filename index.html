function makeSeedTxns(yr) {

  return MONTHS.map((_, mi) => {
    if (y === 2026 && mi > 2) return [];

    const mm = String(mi+1).padStart(2,"0");
    return [
      { id: mi*100+1, desc: "Loblaws",     amount: String(180+mi*10), catId: 1, txnType: "Need", date: `${y}-${mm}-05`, recurring: false, kind: "expense" },

      { id: mi*100+3, desc: "Hydro",       amount: String(95+mi*5),   catId: 3, txnType: "Need", date: `${y}-${mm}-10`, recurring: true,  kind: "expense" },

const S = {
  card: { background: "white", borderRadius: 18, padding: "18px 20px", boxShadow: "0 2px 12px rgba(0,0,0,0.05)", border:"1px solid #F0F0F8" },
  inp:  { border: "1.5px solid #E8E8F0", borderRadius: 10, padding: "9px 11px", fontSize: 16, fontFamily: "inherit", outline: "none", background: "white", color: "#1E2B38", width: "100%", boxSizing: "border-box" },
  lbl:  { fontSize: 10, color: "#bbb", textTransform: "uppercase", letterSpacing: "0.07em", marginBottom: 4, display: "block" },
};

function DonutChart({ segments, size = 110, thickness = 20 }) {
  const r = (size - thickness) / 2, cx = size/2, cy = size/2, circ = 2*Math.PI*r;
  const total = segments.reduce((s, g) => s + g.value, 0);
  if (!total) return <svg width={size} height={size}><circle cx={cx} cy={cy} r={r} fill="none" stroke="#EBE8E4" strokeWidth={thickness}/></svg>;
  let off = 0;
  const paths = segments.map((seg, i) => {
    const dash = (seg.value/total)*circ;
    const el = <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={seg.color} strokeWidth={thickness}
      strokeDasharray={`${dash} ${circ-dash}`} strokeDashoffset={-off} strokeLinecap="butt"
      style={{ transform: "rotate(-90deg)", transformOrigin: "center" }}/>;
    off += dash; return el;
  });
  return <svg width={size} height={size} style={{ overflow: "visible" }}>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="#EBE8E4" strokeWidth={thickness}/>{paths}
  </svg>;
}

function Bar({ value, max, color, over, h = 6 }) {
  const pct = max > 0 ? Math.min(value/max*100, 100) : 0;
  return <div style={{ background: "#EBE8E4", borderRadius: 99, height: h, overflow: "hidden" }}>
    <div style={{ width: pct+"%", height: "100%", borderRadius: 99, background: over ? "#e07070" : color, transition: "width 0.4s" }}/>
  </div>;
}

function DS() { return <span style={{ position:"absolute", left:9, top:"50%", transform:"translateY(-50%)", color:"#bbb", fontSize:12, pointerEvents:"none" }}>$</span>; }
function FL({ children }) { return <div style={S.lbl}>{children}</div>; }

// ─────────────────────────────────────────────
function App() {
  const mob = useIsMobile();
  const [year, setYear_]      = useState(() => load('bud_year', CURRENT_YEAR));
  function setYear(y) { save('bud_year', y); setYear_(y); }
  const [view, setView_]      = useState(() => load('bud_view', 'home'));
  const [mi, setMi_]          = useState(() => { const v = load('bud_mi', CURRENT_MONTH); return typeof v === 'number' ? v : CURRENT_MONTH; });
  // Synchronous wrappers — save immediately before React re-renders
  function setView(v) { save('bud_view', v); setView_(v); }
  function setMi(v)   { save('bud_mi',   v); setMi_(v);   }
  // ── localStorage helpers ──
  function load(key, fallback) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
    catch(e) { return fallback; }
  }
  function save(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
  }

  const [incomes,  setIncomes]  = useState(() => load(`bud_incomes_${load('bud_year',CURRENT_YEAR)}`,  INIT_INCOMES));
  const [cats,     setCats]     = useState(() => load('bud_cats',     INIT_CATS));
  const [allTxns,  setAllTxns]  = useState(() => load(`bud_allTxns_${load('bud_year',CURRENT_YEAR)}`,  makeSeedTxns(load('bud_year',CURRENT_YEAR))));
  const [recur,    setRecur]    = useState(() => load('bud_recur',    INIT_RECURRING));
  const [goals,    setGoals]    = useState(() => load('bud_goals',    INIT_GOALS));
  const [alloc,    setAlloc]    = useState(() => load('bud_alloc',    INIT_ALLOC));
  const [paychecks,setPaychecks]= useState(() => load(`bud_paychecks_${load('bud_year',CURRENT_YEAR)}`,INIT_PAYCHECKS));

  const [touchStartX, setTouchStartX] = useState(null);
  const [touchStartY, setTouchStartY] = useState(null);
  const [swipeCancelled, setSwipeCancelled] = useState(false);
  const [showAdd,     setShowAdd]     = useState(false);
  const [showAlloc,   setShowAlloc]   = useState(false);
  const [showArchived,setShowArchived]= useState(false);
  const [filter,      setFilter]      = useState("all");
  const [yMetric,     setYMetric]     = useState("total");
  const [editAlloc,   setEditAlloc]   = useState(INIT_ALLOC);
  const [addSav,      setAddSav]      = useState({});
  const [recurOverrides, setRecurOverrides] = useState(() => load(`bud_recurOverrides_${load('bud_year',CURRENT_YEAR)}`, {}));
  // Investments — NOT year-specific, carries across all years
  const [investments, setInvestments] = useState(() => load('bud_investments', INIT_INVESTMENTS));
  const [newInv, setNewInv] = useState({ name:'', type:'TFSA', color:'#9CB071', value:'' });
  const [addInvValue, setAddInvValue] = useState({});
  const [newTxn,      setNewTxn]      = useState({ desc:"", amount:"", catId:"", txnType:"Need", date:todayStr(), recurring:false, kind:"expense" });
  const [newRec,      setNewRec]      = useState({ desc:"", amount:"", catId:"", txnType:"Need", day:"1" });
  const [newGoal,     setNewGoal]     = useState({ name:"", target:"", saved:"" });
  const [newCat,      setNewCat]      = useState({ name:"", type:"Need" });

  // ── Auto-save to localStorage on every change ──
  useEffect(() => save(`bud_incomes_${year}`,        incomes),        [incomes, year]);
  useEffect(() => save('bud_cats',                   cats),           [cats]);
  useEffect(() => save(`bud_allTxns_${year}`,        allTxns),        [allTxns, year]);
  useEffect(() => save('bud_recur',                  recur),          [recur]);
  useEffect(() => save('bud_goals',                  goals),          [goals]);
  useEffect(() => save('bud_alloc',                  alloc),          [alloc]);
  useEffect(() => save(`bud_paychecks_${year}`,      paychecks),      [paychecks, year]);
  useEffect(() => save(`bud_recurOverrides_${year}`, recurOverrides), [recurOverrides, year]);
  useEffect(() => save('bud_investments', investments), [investments]);
  useEffect(() => save('bud_view', view), [view]);
  useEffect(() => save('bud_mi', mi), [mi]);


  // ── Year switching ───────────────────────────────
  function switchYear(y) {
    setYear(y);
    setMi_(0); save('bud_mi', 0);
    setIncomes(load(`bud_incomes_${y}`, INIT_INCOMES));
    setAllTxns(load(`bud_allTxns_${y}`, makeSeedTxns(y)));
    setPaychecks(load(`bud_paychecks_${y}`, INIT_PAYCHECKS));
    setRecurOverrides(load(`bud_recurOverrides_${y}`, {}));
  }

  // ── Firebase sync ──────────────────────────────
  const [syncStatus, setSyncStatus] = useState("synced"); // "synced" | "syncing" | "offline"
  const db = typeof firebase !== 'undefined' ? firebase.database() : null;
  const FB_PATH = `budget/vanni/${year}`;
  const FB_INV_PATH = 'budget/vanni/investments';
  const isSyncing = React.useRef(false);

  // On mount: load from Firebase, fall back to localStorage
  useEffect(() => {
    if (!db) return;
    setSyncStatus("syncing");
    const ref = db.ref(FB_PATH);
    ref.once('value').then(snap => {
      const d = snap.val();
      if (d) {
        if (d.incomes)        setIncomes(d.incomes);
        if (d.cats)           setCats(d.cats);
        if (d.allTxns)        setAllTxns(d.allTxns);
        if (d.recur)          setRecur(d.recur);
        if (d.goals)          setGoals(d.goals);
        if (d.alloc)          setAlloc(d.alloc);
        if (d.paychecks)      setPaychecks(d.paychecks);
        if (d.recurOverrides) setRecurOverrides(d.recurOverrides);
        // Don't restore view/mi from Firebase — keep them local per-device
      }
      setSyncStatus("synced");
    }).catch(() => setSyncStatus("offline"));

    // Listen for real-time changes from other devices
    ref.on('value', snap => {
      if (isSyncing.current) return; // ignore echoes of our own writes
      const d = snap.val();
      if (!d) return;
      if (d.incomes)        setIncomes(d.incomes);
      if (d.cats)           setCats(d.cats);
      if (d.allTxns)        setAllTxns(d.allTxns);
      if (d.recur)          setRecur(d.recur);
      if (d.goals)          setGoals(d.goals);
      if (d.alloc)          setAlloc(d.alloc);
      if (d.paychecks)      setPaychecks(d.paychecks);
      if (d.recurOverrides) setRecurOverrides(d.recurOverrides);
    });
    return () => ref.off();
  }, []);

  // Push to Firebase whenever any data changes
  useEffect(() => {
    if (!db) return;
    const timer = setTimeout(() => {
      isSyncing.current = true;
      setSyncStatus("syncing");
      db.ref(FB_PATH).set({ incomes, cats, allTxns, recur, goals, alloc, paychecks, recurOverrides })
        .then(() => { setSyncStatus("synced"); setTimeout(() => { isSyncing.current = false; }, 500); })
        .catch(() => { setSyncStatus("offline"); isSyncing.current = false; });
    }, 800); // debounce 800ms so rapid typing doesn't spam Firebase
    return () => clearTimeout(timer);
  }, [incomes, cats, allTxns, recur, goals, alloc, paychecks, recurOverrides]);

  // Firebase investments sync (separate from year data)
  useEffect(() => {
    if (!db) return;
    db.ref(FB_INV_PATH).once('value').then(snap => {
      const d = snap.val();
      if (d) setInvestments(d);
    }).catch(() => {});
    db.ref(FB_INV_PATH).on('value', snap => {
      const d = snap.val();
      if (d && !isSyncing.current) setInvestments(d);
    });
    return () => db.ref(FB_INV_PATH).off();
  }, []);

  useEffect(() => {
    if (!db) return;
    const timer = setTimeout(() => {
      db.ref(FB_INV_PATH).set(investments).catch(() => {});
    }, 800);
    return () => clearTimeout(timer);
  }, [investments]);

  const inp = S.inp;
  const dInp = x => ({ ...inp, paddingLeft: 22, ...x });

  const VIEWS = ["home","month","investments","yearly","recurring","goals","categories"];
  function handleTouchStart(e) {
    // Only track single-finger swipes — ignore pinch/zoom
    if (e.touches.length !== 1) { setSwipeCancelled(true); return; }
    // Don't intercept touches on buttons, inputs, selects, labels, or textareas
    const tag = e.target.tagName.toLowerCase();
    if (['button','input','select','textarea','label','a'].includes(tag)) {
      setSwipeCancelled(true); return;
    }
    setTouchStartX(e.touches[0].clientX);
    setTouchStartY(e.touches[0].clientY);
    setSwipeCancelled(false);
  }
  function handleTouchMove(e) {
    // Cancel swipe if a second finger appears (pinch-to-zoom)
    if (e.touches.length > 1) { setSwipeCancelled(true); }
  }
  function handleTouchEnd(e) {
    if (touchStartX === null || swipeCancelled) { setTouchStartX(null); return; }
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - (touchStartY || 0);
    // Must be more horizontal than vertical, and exceed 90px threshold
    if (Math.abs(dx) > 90 && Math.abs(dx) > Math.abs(dy) * 2) {
      const idx = VIEWS.indexOf(view);
      if (dx < 0 && idx < VIEWS.length - 1) setView(VIEWS[idx + 1]);
      if (dx > 0 && idx > 0) setView(VIEWS[idx - 1]);
    }
    setTouchStartX(null);
    setTouchStartY(null);
  }

  function bud(idx) {
    const base = n(incomes[idx]);
    const bonus = (allTxns[idx]||[]).filter(t=>t.kind==="income").reduce((s,t)=>s+n(t.amount),0);
    const inc = base+bonus;
    const pc = paychecks[idx] || 2;
    const jointTotal = alloc.joint * pc;
    const momTotal = alloc.mom * pc;
    const avail = Math.max(inc - jointTotal - momTotal, 0);
    return { inc, avail, needs:avail*(alloc.needs/100), wants:avail*(alloc.wants/100), savings:avail*(alloc.savings/100), joint:jointTotal, mom:momTotal, pc };
  }
  function spent(idx) {
    const ex = (allTxns[idx]||[]).filter(t=>t.kind==="expense");
    let ne=0,wa=0,sa=0;
    ex.forEach(t => { if(t.txnType==="Need") ne+=n(t.amount); else if(t.txnType==="Want") wa+=n(t.amount); else sa+=n(t.amount); });
    return { needs:ne, wants:wa, savings:sa, total:ne+wa+sa };
  }

  const B = bud(mi), Sp = spent(mi);
  const mTxns = allTxns[mi]||[];
  const exTxns = mTxns.filter(t=>t.kind==="expense");
  const inTxns = mTxns.filter(t=>t.kind==="income");
  const recApplied = recur.length>0 && recur.every(r=>exTxns.some(t=>t.desc===r.desc&&t.catId===r.catId));

  const fTxns = useMemo(() => {
    let list = [...mTxns].sort((a,b)=>b.date.localeCompare(a.date));
    if (filter==="Need")      list=list.filter(t=>t.txnType==="Need");
    if (filter==="Want")      list=list.filter(t=>t.txnType==="Want");
    if (filter==="Saving")    list=list.filter(t=>t.txnType==="Saving");
    if (filter==="income")    list=list.filter(t=>t.kind==="income");
    if (filter==="recurring") list=list.filter(t=>t.recurring);
    return list;
  }, [mTxns, filter]);

  const yrData = useMemo(() => MONTHS.map((_,i)=>({ month:MONTHS[i], b:bud(i), s:spent(i) })), [incomes,allTxns,alloc]);

  // Load summary data for ALL years for the homepage
  const allYearsData = useMemo(() => {
    const years = Array.from({length: Math.max(year, CURRENT_YEAR) - 2024 + 3}, (_,i) => 2024+i);
    return years.map(y => {
      const yIncomes   = y===year ? incomes   : load(`bud_incomes_${y}`,   INIT_INCOMES);
      const yAllTxns   = y===year ? allTxns   : load(`bud_allTxns_${y}`,   []);
      const yPaychecks = y===year ? paychecks : load(`bud_paychecks_${y}`, INIT_PAYCHECKS);
      const hasData = yIncomes.some(v=>n(v)>0) || yAllTxns.some(m=>m&&m.length>0);
      let totalInc=0, totalSpent=0, totalJoint=0, totalMom=0;
      MONTHS.forEach((_, mi) => {
        const base = n(yIncomes[mi]);
        const bonus = ((yAllTxns[mi]||[]).filter(t=>t.kind==="income")).reduce((s,t)=>s+n(t.amount),0);
        const inc = base+bonus;
        const pc = (yPaychecks[mi]||2);
        totalInc   += inc;
        totalJoint += alloc.joint * pc;
        totalMom   += alloc.mom * pc;
        totalSpent += (yAllTxns[mi]||[]).filter(t=>t.kind==="expense").reduce((s,t)=>s+n(t.amount),0);
      });
      const net = totalInc - totalSpent - totalJoint - totalMom;
      return { year:y, totalInc, totalSpent, totalJoint, totalMom, net, hasData };
    }).filter(d=>d.hasData || d.year===year);
  }, [year, incomes, allTxns, paychecks, alloc]);
  const activeGoals = goals.filter(g=>!g.archived);
  const archGoals   = goals.filter(g=>g.archived);

  function addTxn() {
    if (!newTxn.desc||!newTxn.amount) return;
    if (newTxn.kind==="expense"&&!newTxn.catId) return;
    const t = { ...newTxn, id:Date.now(), catId:newTxn.kind==="income"?null:Number(newTxn.catId) };
    setAllTxns(p=>p.map((m,i)=>i===mi?[...m,t]:m));
    setNewTxn({ desc:"", amount:"", catId:"", txnType:"Need", date:todayStr(), recurring:false, kind:"expense" });
    setShowAdd(false);
  }
  function delTxn(id) { setAllTxns(p=>p.map((m,i)=>i===mi?m.filter(t=>t.id!==id):m)); }
  function applyRecur() {
    const pad = String(mi+1).padStart(2,"0");
    const ex2 = exTxns.map(t=>t.desc+t.catId);
    const toAdd = recur.filter(r=>!ex2.includes(r.desc+r.catId))
      .map(r=>{
        const overrideKey = `${mi}-${r.id}`;
        const amt = recurOverrides[overrideKey] !== undefined ? recurOverrides[overrideKey] : r.amount;
        return { id:Date.now()+Math.random(), desc:r.desc, amount:String(amt), catId:r.catId, txnType:r.txnType, recurring:true, kind:"expense", date:`${year}-${pad}-${String(r.day).padStart(2,"0")}` };
      });
    if(toAdd.length) setAllTxns(p=>p.map((m,i)=>i===mi?[...m,...toAdd]:m));
  }
  function addRecurring() {
    if(!newRec.desc||!newRec.amount||!newRec.catId) return;
    setRecur(p=>[...p,{ ...newRec, id:Date.now(), catId:Number(newRec.catId) }]);
    setNewRec({ desc:"", amount:"", catId:"", txnType:"Need", day:"1" });
  }
  function saveAlloc() {
    const t=n(editAlloc.needs)+n(editAlloc.wants)+n(editAlloc.savings);
    if(Math.round(t)!==100) return;
    setAlloc({ needs:n(editAlloc.needs), wants:n(editAlloc.wants), savings:n(editAlloc.savings), joint:n(editAlloc.joint), mom:n(editAlloc.mom) });
    setShowAlloc(false);
  }
  const archGoal    = id => setGoals(p=>p.map(g=>g.id===id?{...g,archived:true}:g));
  const restoreGoal = id => setGoals(p=>p.map(g=>g.id===id?{...g,archived:false}:g));
  const delGoal     = id => setGoals(p=>p.filter(g=>g.id!==id));
  function saveGoal(id) {
    const amt=n(addSav[id]); if(!amt) return;
    setGoals(p=>p.map(g=>g.id===id?{...g,saved:g.saved+amt}:g));
    setAddSav(p=>({...p,[id]:""}));
  }

  const spendSegs  = [{ value:Sp.needs, color:"#9CB071" },{ value:Sp.wants, color:"#FFB7D5" },{ value:Sp.savings, color:"#9CB071" }].filter(s=>s.value>0);
  const budgetSegs = B.inc>0 ? [{ value:B.needs, color:"#C8DFA8" },{ value:B.wants, color:"#FDEAA0" },{ value:B.savings, color:"#C8DFA8" },{ value:B.joint, color:"#D8E8F5" },{ value:B.mom, color:"#FFD6E8" }] : [];

  // ── Alloc modal ──────────────────────────────
  function AllocModal() {
    const tot = n(editAlloc.needs)+n(editAlloc.wants)+n(editAlloc.savings);
    const ok = Math.round(tot)===100;
    return (
      <div className="overlay" onClick={()=>setShowAlloc(false)}>
        <div onClick={e=>e.stopPropagation()} style={{ background:"white", borderRadius:20, padding:24, width:"100%", maxWidth:380, boxShadow:"0 12px 50px rgba(0,0,0,0.18)", maxHeight:"90vh", overflowY:"auto" }}>
          <div style={{ fontFamily:"'Nunito',sans-serif", fontSize:20, fontWeight:600, marginBottom:4 }}>Edit Allocation</div>
          <p style={{ fontSize:12, color:"#bbb", marginBottom:8 }}>Joint & Mom are per-paycheque amounts, deducted first. Percentages split the remainder.</p>
          <p style={{ fontSize:12, color:"#bbb", marginBottom:20 }}>Percentages must add up to 100%</p>
          {[["needs","Needs","#9CB071"],["wants","Wants","#FFB7D5"],["savings","Savings","#9CB071"]].map(([k,l,c])=>(
            <div key={k} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
              <div style={{ width:8, height:8, borderRadius:2, background:c, flexShrink:0 }}/>

              <div style={{ position:"relative", width:80 }}>
                <input style={{ ...inp, width:80, textAlign:"right", paddingRight:22, fontSize:16 }} value={editAlloc[k]} onChange={e=>setEditAlloc(p=>({...p,[k]:e.target.value}))}/>

              </div>

          <div style={{ padding:"7px 12px", borderRadius:8, background:ok?"#EDEAF8":"#fdeaea", marginBottom:16 }}>
            <span style={{ fontSize:12, fontWeight:500, color:ok?"#9CB071":"#c04040" }}>Total: {tot}% {ok?"✓":"— must equal 100%"}</span>
          </div>
          {[["joint","Joint","#7DB8D4"],["mom","Mom","#AEACEB"]].map(([k,l,c])=>(
            <div key={k} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
              <div style={{ width:8, height:8, borderRadius:2, background:c, flexShrink:0 }}/>

              <div style={{ position:"relative", width:100 }}><DS/><input style={dInp({ width:100, fontSize:16 })} value={editAlloc[k]} onChange={e=>setEditAlloc(p=>({...p,[k]:e.target.value}))}/></div>
            </div>
          ))}

            <button className="tbtn" onClick={saveAlloc} style={{ flex:1, padding:10, background:"#9CB071", color:"white", borderRadius:10 }}>Save Changes</button>
            <button className="tbtn" onClick={()=>setShowAlloc(false)} style={{ padding:"10px 16px", background:"#f5f5f5", color:"#888", borderRadius:10 }}>Cancel</button>
          </div>
        </div>
      </div>
    );
  }

  function GoalMini({ goal }) {
    const rem = Math.max(n(goal.target)-goal.saved, 0);
    const pct = n(goal.target)>0 ? Math.min(goal.saved/n(goal.target)*100,100) : 0;
    const done = rem===0;
    return (
      <div style={{ borderBottom:"1px solid #f5f5f5", paddingBottom:14, marginBottom:14 }}>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>

            <div style={{ fontSize:13, fontWeight:500 }}>{goal.name}</div>
            <div style={{ fontSize:10, color:"#bbb", marginTop:1 }}>{done?"🎉 Complete!":money(rem)+" to go"}</div>
          </div>
          {done
            ? <button onClick={()=>archGoal(goal.id)} style={{ fontSize:10, padding:"2px 8px", borderRadius:99, background:"#EDEAF8", color:"#9CB071", border:"1px solid #BDB8E8", cursor:"pointer", fontFamily:"inherit" }}>Archive ✓</button>
            : <span style={{ fontSize:11, color:"#9CB071", fontWeight:600 }}>{Math.round(pct)}%</span>}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <DonutChart segments={[{ value:goal.saved, color:done?"#9CB071":"#9CB071" },{ value:Math.max(n(goal.target)-goal.saved,0), color:"#f0f0f0" }]} size={44} thickness={8}/>
          <div style={{ flex:1 }}>
            <Bar value={goal.saved} max={n(goal.target)} color={done?"#C8DFA8":"#C8DFA8"} h={5}/>

              <span style={{ fontSize:10, color:"#bbb" }}>{moneyS(goal.saved)} saved</span>

        {!done && (
          <div style={{ display:"flex", gap:5, marginTop:8 }}>
            <div style={{ position:"relative", flex:1 }}><DS/><input style={dInp({ fontSize:16 })} placeholder="Add…" value={addSav[goal.id]||""} onChange={e=>setAddSav(p=>({...p,[goal.id]:e.target.value}))}/></div>

          </div>

      </div>
    );
  }

                </>}

                  const cat = cats.find(c=>c.id===t.catId);

                  return (
                    <div key={t.id} className="row" style={{ display:"grid", gridTemplateColumns:"1fr 90px 90px 100px 90px 20px", gap:"0 8px", padding:"9px 4px", alignItems:"center" }}>

                      <span style={{ fontSize:14, fontWeight:800, color:t.kind==="income"?"#3A5080":"#1a1a1a" }}>{t.kind==="income"?"+":""}{money(t.amount)}</span>

                      <button className="xbtn" onPointerDown={e=>{e.preventDefault();delTxn(t.id)}}>×</button>

                })}
            {/* Net worth circle left + glance right */}
            <div style={{ display:"flex", gap:12, alignItems:"stretch" }}>
              {/* Circle */}

                <div style={{ position:"absolute", top:-20, right:-20, width:70, height:70, borderRadius:"50%", background:"rgba(255,255,255,0.15)", pointerEvents:"none" }}/>
                <div style={{ position:"absolute", bottom:-20, left:-10, width:50, height:50, borderRadius:"50%", background:"rgba(255,255,255,0.1)", pointerEvents:"none" }}/>

                <div style={{ position:"relative", width:mob?84:96, height:mob?84:96, marginBottom:10 }}>
                  <svg viewBox="0 0 100 100" style={{ width:"100%", height:"100%", transform:"rotate(-90deg)" }}>
                    <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.2)" strokeWidth="9"/>

                      strokeDasharray={`${Math.min((netWorth/500000)*264,264)} 264`} strokeLinecap="round"/>
                  </svg>
                  <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
                    <div style={{ fontSize:mob?12:14, fontWeight:900, color:"white", textAlign:"center", lineHeight:1.1 }}>{moneyS(netWorth)}</div>
                  </div>

                  {[{l:"Invest",v:totalInvested,dot:"#F0DB7D"},{l:"Goals",v:totalSaved,dot:"#FFB7D5"}].map(s=>(
                    <div key={s.l} style={{ display:"flex", alignItems:"center", gap:5 }}>

                      <div style={{ fontSize:9, fontWeight:600, color:"rgba(255,255,255,0.7)", flex:1 }}>{s.l}</div>
                      <div style={{ fontSize:10, fontWeight:800, color:"white" }}>{moneyS(s.v)}</div>
                    </div>
                  ))}

              <div style={{ flex:1, display:"flex", flexDirection:"column", gap:8 }}>
                <div style={{ fontSize:11, fontWeight:800, color:"#9D5783", textTransform:"uppercase", letterSpacing:"0.08em" }}>{year} at a glance</div>

                  <>
                    {[
                      {l:"Income",  v:thisYear.totalInc,   bg:"#B7CEEC", c:"#1A3D60"},
                      {l:"Spent",   v:thisYear.totalSpent,  bg:"#FFB7D5", c:"#701040"},

                      <div key={s.l} style={{ background:s.bg, borderRadius:12, padding:"10px 14px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ fontSize:11, fontWeight:800, color:s.c, textTransform:"uppercase", letterSpacing:"0.05em" }}>{s.l}</span>
                        <span style={{ fontSize:mob?13:15, fontWeight:900, color:s.c }}>{s.v<0?"-":""}{moneyS(Math.abs(s.v))}</span>
                      </div>
                    ))}

                )}
              </div>
